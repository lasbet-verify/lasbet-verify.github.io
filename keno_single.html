<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Keno Single verify</title>
    <link rel="stylesheet" href="./lib/main.css" />
    <link rel="stylesheet" href="./lib/bootstrap.min.css" />
    <script src="./lib/vue.min.js"></script>
    <script src="./lib/crypto-js.js"></script>
    <script src="./lib/tools.js"></script>
  </head>
  <body>
    <div id="app" class="main">
      <h1 class="text-center pb-5">Keno Single verify</h1>
      <hr />
      <form class="py-5">
        <h2 class="text-center">Input</h2>
        <div class="form-group">
          <input
            :value="server_seed"
            @change="server_seed = $event.target.value"
            class="form-control"
            placeholder="Server Seed"
          />
        </div>
        <div class="form-group">
          <input
            :value="client_seed"
            @change="client_seed = $event.target.value"
            class="form-control"
            placeholder="Client Seed"
          />
        </div>
        <div class="form-group">
          <input
            :value="nonce"
            @change="nonce = $event.target.value"
            class="form-control"
            placeholder="Nonce"
          />
        </div>
      </form>
      <hr />
      <form class="py-5">
        <h2 class="text-center pb-5">Output</h2>
        <div class="form-group">
          <label>sha256(server_seed)</label>
          <input
            class="form-control"
            readonly
            :value="CryptoJS.SHA256(CryptoJS.enc.Utf8.parse(server_seed)).toString()"
          />
        </div>
        <div class="form-group">
          <label>hmac_sha256(client_seed:nonce:0, server_seed)</label>
          <input class="form-control" readonly :value="first_shuffle_hash" />
        </div>
      </form>
      <hr />
      <form class="py-5">
        <h2 class="text-center pb-5">Final Result</h2>
        <span>{{ resultList }}</span>
        <p class="pt-3 text-muted">
          Uses Fisher-Yates shuffle with HMAC-SHA256(server_seed, client_seed:nonce:counter)
          for counter = 0..38, then sorts the first 10 numbers for display.
        </p>
      </form>
    </div>
  </body>
  <script>
    let qs = tools.queryString();
    var app = new Vue({
      el: "#app",
      data: {
        /** inputs */
        client_seed: qs.c || "",
        server_seed: qs.s || "",
        nonce: parseInt(qs.n) || 0,
      },
      computed: {
        sha256ServerSeed() {
          return CryptoJS.SHA256(
            CryptoJS.enc.Utf8.parse(this.server_seed)
          ).toString();
        },

        first_shuffle_hash() {
          return this.nextShuffleHash(0);
        },

        resultList() {
          return this.getResult();
        },
      },
      watch: {
        "this.gameResult"() {
          ga("send", "event", "Limbo", "verify", this.server_seed, {
            metric0: this.client_seed,
            metric1: this.nonce,
          });
        },
      },
      methods: {
        nextShuffleHash(counter) {
          return CryptoJS.HmacSHA256(
            `${this.client_seed}:${this.nonce}:${counter}`,
            this.server_seed
          ).toString();
        },

        nextShuffleRandom(counter) {
          const hash = this.nextShuffleHash(counter);
          return window.parseInt(hash.substring(0, 8), 16) >>> 0;
        },

        getResult() {
          const numberPoolSize = 40;
          const drawCount = 10;
          const order = Array.from({ length: numberPoolSize }, (_, index) => index + 1);

          let counter = 0;
          for (let i = numberPoolSize - 1; i > 0; i -= 1) {
            const random = this.nextShuffleRandom(counter);
            const j = Math.floor((random * (i + 1)) / Math.pow(2, 32));
            counter += 1;
            const tmp = order[i];
            order[i] = order[j];
            order[j] = tmp;
          }

          return order
            .slice(0, drawCount)
            .sort((a, b) => a - b);
        },
      },
    });
  </script>
</html>
